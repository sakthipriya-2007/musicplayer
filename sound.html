<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Music Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
  }

  .player {
    width: 340px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    color: #fff;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .album-art {
    width: 180px;
    height: 180px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6a00, #ee0979);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    animation: spin 8s linear infinite;
    animation-play-state: paused;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
  }

  .album-art.playing { animation-play-state: running; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .song-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .song-artist { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }

  .progress-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 8px;
    position: relative;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ee0979, #ff6a00);
    border-radius: 3px;
    transition: width 0.1s linear;
  }

  .time {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .controls button {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    transition: transform 0.2s, color 0.2s;
  }

  .controls button:hover { transform: scale(1.15); color: #ff6a00; }

  .btn-prev, .btn-next { font-size: 22px; }

  .btn-play {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ee0979, #ff6a00);
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-play:hover { transform: scale(1.1); color: #fff; }

  .volume-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .volume-container input[type="range"] {
    flex: 1;
    accent-color: #ee0979;
  }

  .playlist {
    text-align: left;
    max-height: 150px;
    overflow-y: auto;
  }

  .playlist h4 {
    font-size: 13px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .playlist ul { list-style: none; }

  .playlist li {
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    transition: background 0.2s;
  }

  .playlist li:hover { background: rgba(255,255,255,0.1); }
  .playlist li.active {
    background: rgba(255,255,255,0.15);
    color: #ff6a00;
    font-weight: 600;
  }

  .playlist li span.duration { opacity: 0.6; font-weight: normal; }

  .autoplay-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .autoplay-toggle input { accent-color: #ee0979; cursor: pointer; }

  .hint {
    font-size: 11px;
    opacity: 0.5;
    margin-top: 14px;
  }
</style>
</head>
<body>

<div class="player">
  <div class="album-art" id="albumArt">🎵</div>
  <div class="song-title" id="songTitle">Track 1</div>
  <div class="song-artist" id="songArtist">Generated Synth</div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="time">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button class="btn-prev" id="prevBtn">⏮</button>
    <button class="btn-play" id="playBtn">▶</button>
    <button class="btn-next" id="nextBtn">⏭</button>
  </div>

  <div class="volume-container">
    <span>🔊</span>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="autoplay-toggle">
    <input type="checkbox" id="autoplayToggle" checked>
    <label for="autoplayToggle">Autoplay next track</label>
  </div>

  <div class="playlist">
    <h4>Playlist</h4>
    <ul id="playlistEl"></ul>
  </div>

  <div class="hint">Tracks are clear synthesized tones (no external audio files needed)</div>
</div>

<script>
  /* ---------- Audio Engine (Web Audio API) ---------- */
  // Generates clean, clear tones using oscillators so the player works
  // without needing external mp3/audio files. Each "song" is a short
  // melody loop with a defined duration.

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  let masterGain = null;

  function ensureAudioContext() {
    if (!audioCtx) {
      audioCtx = new AudioCtx();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = parseFloat(volumeSlider.value);
      masterGain.connect(audioCtx.destination);
    }
  }

  // Each track: a melody = array of [frequency, beatLength]. tempo in seconds per beat.
  const playlist = [
    {
      title: "Morning Calm",
      artist: "Generated Synth",
      tempo: 0.35,
      wave: "sine",
      melody: [
        [523.25, 1], [587.33, 1], [659.25, 1], [698.46, 1],
        [659.25, 1], [587.33, 1], [523.25, 2],
        [659.25, 1], [698.46, 1], [783.99, 1], [880.00, 1],
        [783.99, 1], [698.46, 1], [659.25, 2]
      ]
    },
    {
      title: "Night Drive",
      artist: "Generated Synth",
      tempo: 0.25,
      wave: "triangle",
      melody: [
        [220.00, 1], [261.63, 1], [329.63, 1], [392.00, 1],
        [329.63, 1], [261.63, 1], [220.00, 2],
        [246.94, 1], [293.66, 1], [369.99, 1], [440.00, 1],
        [369.99, 1], [293.66, 1], [246.94, 2]
      ]
    },
    {
      title: "Sunny Beats",
      artist: "Generated Synth",
      tempo: 0.2,
      wave: "square",
      melody: [
        [392.00, 1], [392.00, 1], [440.00, 1], [493.88, 1],
        [440.00, 1], [392.00, 1], [349.23, 2],
        [392.00, 1], [440.00, 1], [493.88, 1], [523.25, 1],
        [493.88, 1], [440.00, 1], [392.00, 2]
      ]
    }
  ];

  let currentTrackIndex = 0;
  let isPlaying = false;
  let scheduledNodes = [];
  let trackStartTime = 0; // audioCtx time when track started
  let trackDuration = 0;
  let progressInterval = null;

  /* ---------- DOM Elements ---------- */
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const songTitle = document.getElementById('songTitle');
  const songArtist = document.getElementById('songArtist');
  const albumArt = document.getElementById('albumArt');
  const progressBar = document.getElementById('progressBar');
  const progressContainer = document.getElementById('progressContainer');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  const volumeSlider = document.getElementById('volumeSlider');
  const autoplayToggle = document.getElementById('autoplayToggle');
  const playlistEl = document.getElementById('playlistEl');

  /* ---------- Helpers ---------- */
  function formatTime(seconds) {
    if (!isFinite(seconds) || seconds < 0) seconds = 0;
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function calcDuration(track) {
    return track.melody.reduce((sum, [, beats]) => sum + beats * track.tempo, 0);
  }

  function buildPlaylistUI() {
    playlistEl.innerHTML = '';
    playlist.forEach((track, idx) => {
      const li = document.createElement('li');
      li.dataset.index = idx;
      const dur = formatTime(calcDuration(track));
      li.innerHTML = `<span>${track.title}</span><span class="duration">${dur}</span>`;
      if (idx === currentTrackIndex) li.classList.add('active');
      li.addEventListener('click', () => {
        loadTrack(idx);
        playTrack();
      });
      playlistEl.appendChild(li);
    });
  }

  function highlightActiveTrack() {
    document.querySelectorAll('.playlist li').forEach((li, idx) => {
      li.classList.toggle('active', idx === currentTrackIndex);
    });
  }

  /* ---------- Core Playback ---------- */
  function loadTrack(index) {
    stopTrack();
    currentTrackIndex = (index + playlist.length) % playlist.length;
    const track = playlist[currentTrackIndex];
    trackDuration = calcDuration(track);

    songTitle.textContent = track.title;
    songArtist.textContent = track.artist;
    durationEl.textContent = formatTime(trackDuration);
    currentTimeEl.textContent = "0:00";
    progressBar.style.width = "0%";
    highlightActiveTrack();
  }

  function scheduleMelody(track, startAt) {
    let t = startAt;
    track.melody.forEach(([freq, beats]) => {
      const noteDuration = beats * track.tempo;
      const osc = audioCtx.createOscillator();
      const noteGain = audioCtx.createGain();

      osc.type = track.wave;
      osc.frequency.value = freq;

      // Smooth attack/release for a clean, click-free sound
      const attack = 0.02;
      const release = 0.05;
      noteGain.gain.setValueAtTime(0, t);
      noteGain.gain.linearRampToValueAtTime(0.9, t + attack);
      noteGain.gain.setValueAtTime(0.9, t + noteDuration - release);
      noteGain.gain.linearRampToValueAtTime(0, t + noteDuration);

      osc.connect(noteGain);
      noteGain.connect(masterGain);

      osc.start(t);
      osc.stop(t + noteDuration);

      scheduledNodes.push(osc);
      t += noteDuration;
    });
    return t; // end time
  }

  function playTrack() {
    ensureAudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const track = playlist[currentTrackIndex];
    const now = audioCtx.currentTime;
    trackStartTime = now;
    scheduleMelody(track, now);

    isPlaying = true;
    playBtn.textContent = '⏸';
    albumArt.classList.add('playing');

    startProgressTracking();

    // Schedule auto-advance to next track
    clearTimeout(window._trackEndTimeout);
    window._trackEndTimeout = setTimeout(() => {
      if (autoplayToggle.checked) {
        loadTrack(currentTrackIndex + 1);
        playTrack();
      } else {
        pauseTrack();
        progressBar.style.width = '100%';
        currentTimeEl.textContent = formatTime(trackDuration);
      }
    }, trackDuration * 1000);
  }

  function stopTrack() {
    scheduledNodes.forEach(osc => {
      try { osc.stop(); } catch (e) {}
    });
    scheduledNodes = [];
    clearTimeout(window._trackEndTimeout);
    stopProgressTracking();
  }

  function pauseTrack() {
    stopTrack();
    isPlaying = false;
    playBtn.textContent = '▶';
    albumArt.classList.remove('playing');
  }

  function togglePlay() {
    if (isPlaying) {
      pauseTrack();
    } else {
      playTrack();
    }
  }

  /* ---------- Progress Bar ---------- */
  function startProgressTracking() {
    stopProgressTracking();
    progressInterval = setInterval(() => {
      const elapsed = audioCtx.currentTime - trackStartTime;
      const pct = Math.min((elapsed / trackDuration) * 100, 100);
      progressBar.style.width = pct + '%';
      currentTimeEl.textContent = formatTime(elapsed);
    }, 100);
  }

  function stopProgressTracking() {
    if (progressInterval) {
      clearInterval(progressInterval);
      progressInterval = null;
    }
  }

  /* ---------- Controls ---------- */
  playBtn.addEventListener('click', togglePlay);

  nextBtn.addEventListener('click', () => {
    loadTrack(currentTrackIndex + 1);
    if (isPlaying) playTrack();
  });

  prevBtn.addEventListener('click', () => {
    loadTrack(currentTrackIndex - 1);
    if (isPlaying) playTrack();
  });

  volumeSlider.addEventListener('input', () => {
    if (masterGain) masterGain.gain.value = parseFloat(volumeSlider.value);
  });

  progressContainer.addEventListener('click', (e) => {
    // Seeking is not supported for synth playback (re-triggers from start)
    loadTrack(currentTrackIndex);
    if (isPlaying) playTrack();
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      togglePlay();
    } else if (e.code === 'ArrowRight') {
      nextBtn.click();
    } else if (e.code === 'ArrowLeft') {
      prevBtn.click();
    }
  });

  /* ---------- Init ---------- */
  buildPlaylistUI();
  loadTrack(0);
</script>

</body>
</html>
